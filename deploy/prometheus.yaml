global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # The auto-healer's own metrics (docker-compose service name / in-cluster Service).
  - job_name: autohealer
    static_configs:
      - targets: ["autohealer:9090"]
